<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login App</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: url('background.jpg') no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
    }

    /* Transparent overlay for slight dim effect */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: 0;
    }

    /* Center login box */
    .login-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 30px 40px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        text-align: center;
        z-index: 1;
        width: 320px;
    }

    .login-box h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .login-box label {
        display: block;
        text-align: left;
        font-weight: bold;
        margin-top: 10px;
        color: #333;
    }

    .login-box input[type="text"],
    .login-box input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
        font-size: 14px;
    }

    .login-box input[type="submit"] {
        width: 100%;
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px;
        margin-top: 20px;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-box input[type="submi"]:hover {
        background-color: #218838;
        
        
    }
</style>
</head>

<body>
    <div class="overlay"></div>

    <div class="login-box">
        <h2>Login App</h2>
        <form action="login" method="post">
            <label for="uname">Username:</label>
            <input type="text" id="uname" name="uname" required>

            <label for="pwd">Password:</label>
            <input type="password" id="pwd" name="upwd" required>

			<input type="submit" value="Login">
            
        </form>
    </div>
</body>
</html>
