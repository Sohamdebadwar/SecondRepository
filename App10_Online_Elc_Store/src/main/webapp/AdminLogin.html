<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(to right, #e3f2fd, #f8f9fa);
        margin: 0;
        padding: 0;
    }

    .container {
        margin-top: 120px;
        background-color: #ffffff;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        width: 400px;
        padding: 40px;
        text-align: center;
    }

    h1 {
        color: #0d47a1;
        margin-bottom: 30px;
    }

    input[type="text"],
    input[type="password"] {
        width: 85%;
        padding: 10px;
        margin: 10px 0 20px 0;
        border: 1px solid #90caf9;
        border-radius: 6px;
        font-size: 14px;
        transition: 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
        border-color: #1976d2;
        outline: none;
        box-shadow: 0 0 5px #64b5f6;
    }

    input[type="submit"] {
        background-color: #1976d2;
        color: white;
        border: none;
        padding: 10px 30px;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    input[type="submit"]:hover {
        background-color: #0d47a1;
        transform: scale(1.05);
    }

    label {
        color: #1565c0;
        font-weight: 600;
    }
</style>

</head>
<body>
    <center>
        <div class="container">
            <h1>Welcome to Admin Login Page</h1>
            <form action="alogin" method="post">
                <label>User Name :</label><br>
                <input type="text" name="aname" required><br>
                
                <label>Password :</label><br>
                <input type="password" name="apwd" required><br>
                
                <input type="submit" value="Login">
            </form>
        </div>
    </center>
</body>
</html>
