<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Portal</title>

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(to right, #e3f2fd, #f8f9fa);
        margin: 0;
        padding: 0;
    }

    .container {
        margin-top: 150px;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        width: 400px;
        text-align: center;
    }

    h1 {
        color: #0d47a1;
        margin-bottom: 30px;
    }

    a {
        display: inline-block;
        text-decoration: none;
        background-color: #1976d2;
        color: white;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: bold;
        margin: 15px 0;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    a:hover {
        background-color: #0d47a1;
        transform: scale(1.08);
    }

    a:nth-child(2) {
        background-color: #43a047; /* Green for customer */
    }

    a:nth-child(2):hover {
        background-color: #1b5e20;
    }
</style>

</head>
<body>
    <center>
        <div class="container">
            <h1>Welcome to Login Portal</h1>
            <a href="AdminLogin.html">Admin Login</a><br><br>
            <a href="CustomerLogin.html">Customer Login</a><br><br>
        </div>
    </center>
</body>
</html>
