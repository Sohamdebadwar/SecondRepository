<!DOCTYPE html>
<html>
<head>
<title>Register Customer</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f5;
        margin: 0;
        padding: 0;
    }

    .reg-box {
        width: 450px;
        background: #ffffff;
        margin: 50px auto;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    label {
        font-size: 16px;
        color: #444;
    }

    input[type="text"],
    input[type="password"] {
        width: 95%;
        padding: 12px;
        margin: 8px 0 15px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
    }

    input[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #0077ff;
        color: white;
        font-size: 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background: #005bd1;
    }
</style>

</head>
<body>

<div class="reg-box">
    <h2>Customer Registration</h2>

    <form action="customerregister" method="post">

        <label>User Name:</label>
        <input type="text" name="uname">

        <label>Password:</label>
        <input type="password" name="pwd">

        <label>First Name:</label>
        <input type="text" name="fname">

        <label>Last Name:</label>
        <input type="text" name="lname">

        <label>Address:</label>
        <input type="text" name="addr">

        <label>Mail ID:</label>
        <input type="text" name="mid">

        <label>Phone No:</label>
        <input type="text" name="phno">

        <input type="submit" value="Register">

    </form>
</div>

</body>
</html>
